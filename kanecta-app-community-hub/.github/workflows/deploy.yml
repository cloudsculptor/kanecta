name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: featherston-client-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: featherston-client-web

      - name: Build
        run: npm run build
        working-directory: featherston-client-web
        env:
          VITE_KEYCLOAK_URL: ${{ secrets.VITE_KEYCLOAK_URL }}
          VITE_KEYCLOAK_REALM: ${{ secrets.VITE_KEYCLOAK_REALM }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ secrets.VITE_KEYCLOAK_CLIENT_ID }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            featherston-client-web/dist/ \
            root@${{ secrets.DEPLOY_HOST }}:/var/www/featherston/

      - name: Deploy API
        run: |
          rsync -az --delete --exclude node_modules -e "ssh -i ~/.ssh/deploy_key" \
            featherston-api/ \
            root@${{ secrets.DEPLOY_HOST }}:/opt/featherston-api/
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/featherston-api && npm install --omit=dev && pm2 restart featherston-api"
