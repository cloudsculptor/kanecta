services:
  keycloak-db:
    image: postgres:18
    container_name: kanecta-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "45981:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: kanecta-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak # gitleaks:allow (not a secret — JDBC URL for the local dev-only Postgres above, with hardcoded placeholder creds)
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
    ports:
      - "45980:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      - keycloak-db

  minio:
    image: minio/minio:latest
    container_name: kanecta-keycloak-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kanecta
      MINIO_ROOT_PASSWORD: kanecta-minio-secret
    ports:
      - "45990:9000"
      - "45991:9001"
    volumes:
      - minio-data:/data

volumes:
  keycloak-db-data:
  minio-data:
