name: Deploy Community Hub Constitution

on:
  push:
    branches: [master]
    paths:
      - 'kanecta-apps/kanecta-apps/kanecta-app-community-hub/community-hub-governance/constitution/constitution.adoc'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kanecta-apps/kanecta-app-community-hub/community-hub-governance/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: kanecta-apps/kanecta-app-community-hub/community-hub-governance

      - name: Build constitution HTML
        run: node build.js
        working-directory: kanecta-apps/kanecta-app-community-hub/community-hub-governance

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy constitution
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            kanecta-apps/kanecta-app-community-hub/community-hub-governance/index.html \
            root@${{ secrets.DEPLOY_HOST }}:/var/www/featherston-constitution/
