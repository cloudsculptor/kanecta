name: Studio CI

on:
  push:
    branches:
      - '**'

jobs:
  lint-and-typecheck:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        working-directory: kanecta-ui/kanecta-apps/kanecta-app-studio
        run: npm run lint
      - name: Type check
        working-directory: kanecta-ui/kanecta-apps/kanecta-app-studio
        run: npm run typecheck

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        working-directory: kanecta-ui/kanecta-apps/kanecta-app-studio
        run: npm test

  storybook:
    name: Storybook interaction tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: Build Storybook
        working-directory: kanecta-ui/kanecta-apps/kanecta-app-studio
        run: npm run build-storybook
      - name: Run Storybook interaction tests
        working-directory: kanecta-ui/kanecta-apps/kanecta-app-studio
        run: |
          npx serve storybook-static --listen 6006 &
          npx wait-on http://127.0.0.1:6006
          npm run test-storybook

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    needs: [unit-tests, storybook]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
