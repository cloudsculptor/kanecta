name: Studio CI

on:
  push:
    branches:
      - '**'

jobs:
  test:
    name: Type check & unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        working-directory: kanecta-apps/kanecta-app-studio
        run: npx tsc -b --noEmit

      - name: Run unit tests
        working-directory: kanecta-apps/kanecta-app-studio
        run: npm test

  storybook:
    name: Storybook interaction tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build Storybook
        working-directory: kanecta-apps/kanecta-app-studio
        run: npm run build-storybook

      - name: Run Storybook interaction tests
        working-directory: kanecta-apps/kanecta-app-studio
        run: |
          npx serve storybook-static --listen 6006 &
          npx wait-on http://127.0.0.1:6006
          npm run test-storybook
